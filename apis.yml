aid: sensibo
url: https://raw.githubusercontent.com/api-evangelist/sensibo/refs/heads/main/apis.yml
name: Sensibo
kind: company
description: Sensibo builds smart air conditioning controllers and indoor air quality
  monitors (Sensibo Sky, Air, Air Pro, and Elements) that add app, voice, and API
  control to existing mini-split, window, and portable AC and heat-pump units. The
  Sensibo REST API (base https://home.sensibo.com/api/v2) gives developers full
  control over enrolled devices ("pods") - reading temperature, humidity, and air
  quality measurements, getting and setting the AC state (power, mode, target
  temperature, fan, swing), configuring the Climate React smart automation, and
  managing schedules and timers. Authentication is a per-account API key passed as
  an apiKey query parameter, generated from home.sensibo.com/me/api. OAuth2 is
  available for commercial integrations.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Smart Home
- IoT
- Air Conditioning
- HVAC
- Air Quality
- Climate Control
- Connected Devices
