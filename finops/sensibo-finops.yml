principles:
- name: Visibility
  description: Track subscription seats and the count of enrolled devices; API calls are free but worth monitoring against rate limits.
- name: Allocation
  description: Map Sensibo Plus subscriptions and hardware to the room, site, or team that owns each device.
- name: Optimization
  description: The API has no marginal cost; optimize by right-sizing the device fleet and only subscribing to Sensibo Plus where its features are needed.
- name: Accountability
  description: Assign an owner per site/account for hardware purchases and subscription renewals.
