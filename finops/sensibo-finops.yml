description: >-
  FinOps view of Sensibo spend. Sensibo's REST API carries no usage-based fee -
  it is free for any device owner with an API key - so there is no per-call or
  per-token cloud bill to optimize on the API itself. The real cost drivers are
  (1) one-time hardware purchases of Sensibo controllers and monitors (Sky, Air,
  Air Pro, Elements) and (2) the optional recurring Sensibo Plus consumer
  subscription (about $2.99/month, or ~$2.49/month as the Energy Saver Plan).
  For most developers the API is a fixed, zero-marginal-cost integration; FinOps
  attention belongs on subscription seats and hardware fleet size rather than API
  metering.
notes: >-
  There is no metered API charge to reconcile. Track subscription seats and
  hardware count. A commercial OAuth2 program exists for business integrations
  (contact support@sensibo.com); its terms are negotiated and not published.
